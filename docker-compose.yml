      - ./_analyze/install.sql:/analyze.sql:ro
      - ./_record/tests:/tests/record:ro
      - ./_analyze/tests:/tests/analyze:ro
      - ./_control/tests:/tests/control:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres17:
    profiles: ["pg17", "all"]
    build:
      context: .
      args:
        PG_VERSION: 17
    image: pgfr_record_test:17
    container_name: pgfr_record_test-17

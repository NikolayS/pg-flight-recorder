services:
  postgres15:
    profiles: ["pg15", "all"]
    build:
      context: .
      args:
        PG_VERSION: 15
    image: pgfr_record_test:15
    container_name: pgfr_record_test-15
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5415:5432"
    volumes:
      - postgres15_data:/var/lib/postgresql/data
      - ./_record/install.sql:/install.sql:ro
      - ./_control/install.sql:/control.sql:ro
      - ./_analyze/install.sql:/analyze.sql:ro
      - ./_record/tests:/tests/record:ro
      - ./_analyze/tests:/tests/analyze:ro
      - ./_control/tests:/tests/control:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres16:
    profiles: ["pg16", "all"]

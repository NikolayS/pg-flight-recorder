name: Publish to dbdev

on:
  workflow_call:
    inputs:
      version:
        description: 'Version tag (e.g., v2.24)'
        required: true
        type: string
    secrets:
      DBDEV_TOKEN:
        required: true
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v2.24)'
        required: true
        type: string

jobs:
  publish:
    name: Publish to dbdev
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          RAW="${{ inputs.version }}"
          # Strip v prefix
          VER="${RAW#v}"
          # Ensure three-part semver (dbdev requires x.y.z)
          if [[ "$VER" =~ ^[0-9]+\.[0-9]+$ ]]; then
            VER="${VER}.0"
          fi
          echo "version=$VER" >> $GITHUB_OUTPUT

      - name: Prepare core extension files
        run: |
          VER="${{ steps.version.outputs.version }}"
          cp install.sql "pg_flight_recorder--${VER}.sql"
          sed -i "s/^default_version = .*/default_version = '${VER}'/" pg_flight_recorder.control

          # Safety: verify dbdev size limit
          SIZE=$(wc -c < "pg_flight_recorder--${VER}.sql")
          echo "Core package size: ${SIZE} chars"
          if [ "$SIZE" -gt 250000 ]; then
            echo "ERROR: install.sql is ${SIZE} chars, exceeds 250,000 char dbdev limit"
            exit 1
          fi

      - name: Prepare reporting extension files
        run: |
          VER="${{ steps.version.outputs.version }}"
          mkdir -p pkg_reporting
          cp reporting.sql "pkg_reporting/pg_flight_recorder_reporting--${VER}.sql"
          cp pg_flight_recorder_reporting.control pkg_reporting/
          sed -i "s/^default_version = .*/default_version = '${VER}'/" pkg_reporting/pg_flight_recorder_reporting.control

          # dbdev requires a README.md in the package directory
          cat > pkg_reporting/README.md <<'READMEEOF'
          # pg_flight_recorder_reporting

          Reporting and analysis functions for [pg_flight_recorder](https://database.dev/dventimi/pg_flight_recorder).

          Requires `pg_flight_recorder` core to be installed first.
          READMEEOF
          sed -i 's/^ *//' pkg_reporting/README.md

          # Safety: verify dbdev size limit
          SIZE=$(wc -c < "pkg_reporting/pg_flight_recorder_reporting--${VER}.sql")
          echo "Reporting package size: ${SIZE} chars"
          if [ "$SIZE" -gt 250000 ]; then
            echo "ERROR: reporting.sql is ${SIZE} chars, exceeds 250,000 char dbdev limit"
            exit 1
          fi

      - name: Install dbdev CLI
        run: |
          DEB_URL=$(curl -fsSL https://api.github.com/repos/supabase/dbdev/releases/latest \
            | jq -r '.assets[] | select(.name | endswith("linux-amd64.deb")) | .browser_download_url')
          curl -fsSL -o dbdev.deb "$DEB_URL"
          sudo dpkg -i dbdev.deb

      - name: Authenticate to dbdev
        env:
          DBDEV_TOKEN: ${{ secrets.DBDEV_TOKEN }}
        run: |
          mkdir -p ~/.dbdev
          printf '[registries.dbdev]\ntoken = "%s"\n' "$DBDEV_TOKEN" > ~/.dbdev/credentials.toml

      - name: Publish core package
        run: |
          # Hide reporting control file so dbdev sees only the core one
          rm pg_flight_recorder_reporting.control
          dbdev publish

      - name: Publish reporting package
        run: |
          cd pkg_reporting && dbdev publish

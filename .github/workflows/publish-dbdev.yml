name: Publish to dbdev

on:
  workflow_call:
    inputs:
      version:
        description: 'Version tag (e.g., v2.24)'
        required: true
        type: string
    secrets:
      DBDEV_TOKEN:
        required: true
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v2.24)'
        required: true
        type: string

jobs:
  publish:
    name: Publish to dbdev
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          RAW="${{ inputs.version }}"
          # Strip v prefix
          VER="${RAW#v}"
          # Ensure three-part semver (dbdev requires x.y.z)
          if [[ "$VER" =~ ^[0-9]+\.[0-9]+$ ]]; then
            VER="${VER}.0"
          fi
          echo "version=$VER" >> $GITHUB_OUTPUT

      - name: Prepare extension files
        run: |
          VER="${{ steps.version.outputs.version }}"
          cp install.sql "pg_flight_recorder--${VER}.sql"
          sed -i "s/^default_version = .*/default_version = '${VER}'/" pg_flight_recorder.control

      - name: Install dbdev CLI
        run: |
          DEB_URL=$(curl -fsSL https://api.github.com/repos/supabase/dbdev/releases/latest \
            | jq -r '.assets[] | select(.name | endswith("linux-amd64.deb")) | .browser_download_url')
          curl -fsSL -o dbdev.deb "$DEB_URL"
          sudo dpkg -i dbdev.deb

      - name: Authenticate to dbdev
        env:
          DBDEV_TOKEN: ${{ secrets.DBDEV_TOKEN }}
        run: |
          mkdir -p ~/.dbdev
          printf '[localhost]\napi_token = "%s"\n' "$DBDEV_TOKEN" > ~/.dbdev/credentials.toml

      - name: Publish to dbdev
        run: |
          dbdev publish
